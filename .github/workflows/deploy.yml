name: Deploy Flying Ruby to GitHub Pages

# Flying Ruby is a static site (vanilla JS + Phaser from CDN, no build
# step), so this just publishes the game files as-is. The previous
# Vite-built "Ruby Blaster" project is preserved under zuma-clone/ and is
# not deployed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage the Flying Ruby site
        run: |
          mkdir -p _site
          cp -r index.html README.md src assets bgm sfx _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
