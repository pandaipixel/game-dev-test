<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#031034" />
    <title>Ruby Blaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pandai-red: #af1726;
        --pandai-brick: #9e131f;
        --pandai-yellow: #ffd633;
        --pandai-dark-yellow: #ffb603;
        --pandai-blue: #133b9f;
        --pandai-black: #031034;
        --pandai-white: #ffffff;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--pandai-black);
        overflow: hidden;
        font-family: "Poppins", system-ui, sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      body {
        /* dynamic viewport height — keeps canvas visible when mobile chrome shows/hides */
        height: 100dvh;
      }
      #game {
        width: 100vw;
        height: 100dvh;
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      canvas {
        display: block;
        image-rendering: auto;
        box-shadow: 0 0 60px rgba(175, 23, 38, 0.45);
        border-radius: 8px;
        max-width: 100%;
        max-height: 100%;
      }

      /* Portrait-orientation hint on small screens — non-blocking */
      .rotate-hint {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
        background: rgba(3, 16, 52, 0.92);
        color: var(--pandai-white);
        font-family: "Poppins", system-ui, sans-serif;
        font-weight: 600;
        z-index: 10;
        text-align: center;
        padding: 24px;
        pointer-events: auto;
      }
      .rotate-hint .phone {
        width: 64px;
        height: 100px;
        border: 4px solid var(--pandai-yellow);
        border-radius: 10px;
        animation: rotate-phone 1.6s ease-in-out infinite;
      }
      .rotate-hint .label {
        font-size: 16px;
        letter-spacing: 2px;
        color: var(--pandai-yellow);
      }
      .rotate-hint .sub {
        font-size: 12px;
        opacity: 0.7;
      }
      @keyframes rotate-phone {
        0%, 30% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
      @media (orientation: portrait) and (max-width: 820px) and (hover: none) {
        .rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="rotate-hint" onclick="this.style.display='none'">
      <div class="phone"></div>
      <div class="label">ROTATE YOUR DEVICE</div>
      <div class="sub">tap to dismiss</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
