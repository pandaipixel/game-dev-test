<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#031034" />
    <title>Ruby Blaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pandai-red: #af1726;
        --pandai-brick: #9e131f;
        --pandai-yellow: #ffd633;
        --pandai-dark-yellow: #ffb603;
        --pandai-blue: #133b9f;
        --pandai-black: #031034;
        --pandai-white: #ffffff;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--pandai-black);
        overflow: hidden;
        font-family: "Poppins", system-ui, sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      body {
        /* 100vh fallback for older browsers that don't recognize dvh;
           modern browsers (Safari 15.4+, Chrome 108+) use dvh which
           accounts for the dynamic mobile chrome show/hide. */
        height: 100vh;
        height: 100dvh;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        position: fixed;
        inset: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        image-rendering: auto;
        box-shadow: 0 0 30px rgba(175, 23, 38, 0.35);
      }

      /* Loading splash — visible immediately while the JS bundle downloads.
         Hidden once Phaser appends its canvas. */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--pandai-black);
        z-index: 5;
        font-family: "Poppins", system-ui, sans-serif;
        color: var(--pandai-yellow);
        letter-spacing: 4px;
        font-weight: 700;
      }
      #loading .spinner {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(255, 214, 51, 0.2);
        border-top-color: var(--pandai-yellow);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* The splash is removed explicitly by StartScene.create() once the
         BootScene has finished loading all assets — see src/scenes/StartScene.ts.
         Earlier we hid it via `#game:has(canvas) ~ #loading { display: none; }`
         but Phaser appends its canvas inside the Phaser.Game constructor
         (before BootScene's loader runs), which hid the splash too early and
         left the player staring at a dark canvas. */

      /* Portrait-orientation hint on small screens — non-blocking */
      .rotate-hint {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
        background: rgba(3, 16, 52, 0.92);
        color: var(--pandai-white);
        font-family: "Poppins", system-ui, sans-serif;
        font-weight: 600;
        z-index: 10;
        text-align: center;
        padding: 24px;
        pointer-events: auto;
      }
      .rotate-hint .phone {
        width: 64px;
        height: 100px;
        border: 4px solid var(--pandai-yellow);
        border-radius: 10px;
        animation: rotate-phone 1.6s ease-in-out infinite;
      }
      .rotate-hint .label {
        font-size: 16px;
        letter-spacing: 2px;
        color: var(--pandai-yellow);
      }
      .rotate-hint .sub {
        font-size: 12px;
        opacity: 0.7;
      }
      @keyframes rotate-phone {
        0%, 30% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
      @media (orientation: portrait) and (max-width: 820px) and (hover: none) {
        .rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="loading">
      <div class="spinner"></div>
      <div>LOADING</div>
    </div>
    <div class="rotate-hint">
      <div class="phone"></div>
      <div class="label">ROTATE YOUR DEVICE</div>
      <div class="sub">landscape required</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
